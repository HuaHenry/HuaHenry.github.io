short_bio: >-
  <p>Hi👋 I am Zhouqi Hua (华洲琦).
  </p>
  <p>
    I am a first-year <strong>Ph.D. student</strong> at <a href="https://www.fudan.edu.cn/" target="_blank">Fudan University</a>, jointly affiliated with the Large Model Center at <a href="https://www.shlab.org.cn/" target="_blank">Shanghai AI Laboratory</a>. I am fortunate to be advised by Dr. <a href="https://zhangwenwei.cn/" target="_blank">Wenwei Zhang</a>, Dr. <a href="https://chenkai.site/" target="_blank">Kai Chen</a>, and Prof. <a href="https://dahua.site/" target="_blank">Dahua Lin</a>. Prior to that, I received my Bachelor of Engineering degree from <a href="https://www.tongji.edu.cn/" target="_blank">Tongji University</a> in 2025.
  </p>
  <p>
    My research focus on <strong>generalization in LLMs</strong>, including length generalization and compositional generalization. Now I am interested in investigating the <strong>mathematical abilities of LLMs</strong>, with a particular focus on evaluating and improving their performance on research-level mathematical reasoning.
  </p>

